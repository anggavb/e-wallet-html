<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - E-Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/front-page.css">
    <link rel="stylesheet" href="../styles/global.btn.css">
</head>
<body>

    <main id="register-container">
        
        <section class="form-panel">
            <div class="form-content">
                
                <header>
                    <div class="logo">
                            <img src="../assets/icons/money-wallet.png" alt="wallet" width="32" />
                            <span>E-Wallet</span>
                        </div>
                    </header>
    
                    <h1>Start Accessing Banking Needs With All Devices and All Platforms With 30.000+ Users</h1>
                    <p class="subtitle">Transfering money is easier than ever, you can access Zwallet wherever you are. Desktop, laptop, mobile phone? we cover all of that for you!</p>
    
                    <div class="social-logins">
                        <button class="social-btn">
                            <img src="../assets/icons/google.svg" alt="Google Logo" class="social-icon"> 
                            Sign In With Google
                        </button>
                        <button class="social-btn">
                            <img src="../assets/icons/facebook.svg" alt="Facebook Logo" class="social-icon"> 
                            Sign In With Facebook
                        </button>
                    </div>
    
                    <div class="divider">
                        <span>Or</span>
                    </div>
    
                    <form action="#" method="POST">
                        <div class="input-group">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                <img src="../assets/icons/mail.svg" alt="Email Icon" class="icon-left">
                                <input type="email" id="email" placeholder="Enter Your Email" required>
                            </div>
                        </div>
    
                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <img src="../assets/icons/Password.svg" alt="Lock Icon" class="icon-left">
                                <input type="password" id="password" placeholder="Enter Your Password" required>
                                <img src="../assets/icons/EyeSlash.svg" alt="Hide Password" class="icon-right">
                            </div>
                        </div>
    
                        <div class="input-group">
                            <label for="confirm-password">Confirm Password</label>
                            <div class="input-wrapper">
                                <img src="../assets/icons/Password.svg" alt="Lock Icon" class="icon-left">
                                <input type="password" id="confirm-password" placeholder="Enter Your Password Again" required>
                                <img src="../assets/icons/EyeSlash.svg" alt="Hide Password" class="icon-right">
                            </div>
                        </div>
    
                        <button type="submit" class="submit-btn">Register</button>
                    </form>
    
                    <nav id="auth-nav">
                        <p>Have An Account? <a href="/pages/login.html">Login</a></p>
                    </nav>
    
                </div>
            </div>
        </section>

        <section class="image-panel">
            <img src="../assets/images/wallet-hand.png" alt="3D Hand holding a wallet">
        </section>

    </main>

</body>
</html>

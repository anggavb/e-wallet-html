<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Pin - E-Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/front-page.css">
    <link rel="stylesheet" href="../styles/enter-pin.css">
    <link rel="stylesheet" href="../styles/global.btn.css">
</head>
<body>

    <main id="register-container">
        
        <section class="form-panel">
                <div class="form-content">
                    
                    <header>
                        <div class="logo">
                            <img src="../assets/icons/money-wallet.png" alt="wallet" width="32" />
                            <span>E-Wallet</span>
                        </div>
                    </header>
    
                    <h1>Enter Your Pin 👋</h1>
                    <p class="subtitle">Please save your pin because this so important.</p>
    
                    <form action="#" method="POST">
    
                        <div class="pin-input-group">
                            <input type="text" maxlength="1" class="pin-box active-pin" value="1" inputmode="numeric" autofocus>
                            <input type="text" maxlength="1" class="pin-box" inputmode="numeric">
                            <input type="text" maxlength="1" class="pin-box" inputmode="numeric">
                            <input type="text" maxlength="1" class="pin-box" inputmode="numeric">
                            <input type="text" maxlength="1" class="pin-box" inputmode="numeric">
                            <input type="text" maxlength="1" class="pin-box" inputmode="numeric">
                        </div>
    
                        <button type="submit" class="submit-btn">Submit</button>
                    </form>
    
                    <nav id="auth-nav">
                        <p>Forgot Your Pin? <a href="./profile-change-pin.html">Reset</a></p>
                    </nav>
    
                </div>
            </div>
        </section>

        <section class="image-panel">
            <img src="../assets/images/enter-pin.png" alt="3D Hand holding a wallet">
        </section>

    </main>

</body>
</html>

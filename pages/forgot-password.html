<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - E-Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/forgot-password.css">
</head>
<body>

    <main id="forgot-password-container">
        
        <section>
            <div class="form-panel">
                <div class="form-content">
                    
                    <header>
                        <div class="logo">
                            <img src="../assets/icons/money-wallet.png" alt="wallet" width="32" />
                            <span>E-Wallet</span>
                        </div>
                    </header>
    
                    <h1>Fill Out Form Correctly 👋</h1>
                    <p class="subtitle">We will send new password to your email</p>
    
                    <form action="#" method="POST">
                        <div class="input-group">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                <img src="../assets/icons/mail.svg" alt="Email Icon" class="icon-left">
                                <input type="email" id="email" placeholder="Enter Your Email" required>
                            </div>
                        </div>
    
                        <button type="submit" class="submit-btn">Submit</button>
                    </form>
    
                </div>
            </div>
        </section>

    </main>

</body>
</html>

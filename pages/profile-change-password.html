<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Wallet - Change Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="stylesheet" href="../styles/profile.css">
    <link rel="stylesheet" href="../styles/profile-change-password.css">
</head>
<body id="profile-page">

    <header id="topbar">
        <div class="logo">
            <img src="../assets/icons/money-wallet.png" alt="wallet" width="32" />
            <span>E-Wallet</span>
        </div>
        <div class="user-profile">
            <span class="username">Ghaluh Wizard</span>
            <img src="../assets/images/Ellipse 185.png" alt="Profile" class="avatar">
            <img src="../assets/icons/chevron-down.svg" alt="Navigation Arrow">
        </div>
    </header>

    <div class="layout-wrapper">
        <aside id="sidebar">
            <nav>
                <ul class="nav-links">
                    <li><a href="./dashboard.html"><img src="../assets/icons/dashboard-two-normal.svg" alt="Dashboard Icon" class="nav-icon">Dashboard</a></li>
                    <li><a href="./transfer.html"><img src="../assets/icons/Send.svg" alt="Transfer Icon" class="nav-icon"> Transfer</a></li>
                    <li><a href="./history.html"><img src="../assets/icons/history.svg" alt="History Icon" class="nav-icon"> History</a></li>
                    <li><a href="./top-up.html"><img src="../assets/icons/Upload.svg" alt="Top Up Icon" class="nav-icon"> Top Up</a></li>
                    <li class="active"><a href="./profile.html"><img src="../assets/icons/2 User.svg" alt="Profile Icon" class="nav-icon"> Profile</a></li>
                    <li><a href="./login.html"><img src="../assets/icons/exit.svg" alt="Exit Icon" class="nav-icon"> Keluar</a></li>
                </ul>
            </nav>
        </aside>

        <main id="main-content">

            <div class="page-header">
                <h2 class="page-title">
                    <img src="../assets/icons/2 User.svg" alt="Profile Icon">
                    Profile
                </h2>
            </div>

            <div class="edit-profile-container">
                <div class="card edit-profile-form">

                    <h3 class="change-password-title">Change Password</h3>

                    <form action="#" method="POST" id="change-password-form">

                        <!-- Existing Password -->
                        <div class="form-group">
                            <label class="section-label" for="existing-password">Existing Password</label>
                            <div class="input-with-icon">
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5.79258 6.66667C5.79258 7.34867 5.23991 7.90133 4.55791 7.90133C3.87591 7.90133 3.32324 7.34867 3.32324 6.66667C3.32324 5.98467 3.87591 5.432 4.55791 5.432H4.55991C5.24124 5.43267 5.79258 5.98533 5.79258 6.66667Z" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M5.79462 6.66667H10.0066V7.90133" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M8.12142 7.90133V6.66667" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M0.5 6.66667C0.5 2.042 2.042 0.5 6.66667 0.5C11.2913 0.5 12.8333 2.042 12.8333 6.66667C12.8333 11.2913 11.2913 12.8333 6.66667 12.8333C2.042 12.8333 0.5 11.2913 0.5 6.66667Z" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <input type="password" id="existing-password" placeholder="Enter Your Existing Password" class="form-control">
                                <button type="button" class="toggle-password" data-target="existing-password" aria-label="Toggle password visibility">
                                    <svg class="eye-icon eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M1 1l22 22" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M10.73 10.73a3 3 0 0 0 4.54 4.54" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <svg class="eye-icon eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <circle cx="12" cy="12" r="3" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- New Password -->
                        <div class="form-group">
                            <label class="section-label" for="new-password">New Password</label>
                            <div class="input-with-icon">
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5.79258 6.66667C5.79258 7.34867 5.23991 7.90133 4.55791 7.90133C3.87591 7.90133 3.32324 7.34867 3.32324 6.66667C3.32324 5.98467 3.87591 5.432 4.55791 5.432H4.55991C5.24124 5.43267 5.79258 5.98533 5.79258 6.66667Z" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M5.79462 6.66667H10.0066V7.90133" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M8.12142 7.90133V6.66667" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M0.5 6.66667C0.5 2.042 2.042 0.5 6.66667 0.5C11.2913 0.5 12.8333 2.042 12.8333 6.66667C12.8333 11.2913 11.2913 12.8333 6.66667 12.8333C2.042 12.8333 0.5 11.2913 0.5 6.66667Z" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <input type="password" id="new-password" placeholder="Enter Your New Password" class="form-control">
                                <button type="button" class="toggle-password" data-target="new-password" aria-label="Toggle password visibility">
                                    <svg class="eye-icon eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M1 1l22 22" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M10.73 10.73a3 3 0 0 0 4.54 4.54" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <svg class="eye-icon eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <circle cx="12" cy="12" r="3" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Confirm New Password -->
                        <div class="form-group">
                            <label class="section-label" for="confirm-password">Confirm New Password</label>
                            <div class="input-with-icon">
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5.79258 6.66667C5.79258 7.34867 5.23991 7.90133 4.55791 7.90133C3.87591 7.90133 3.32324 7.34867 3.32324 6.66667C3.32324 5.98467 3.87591 5.432 4.55791 5.432H4.55991C5.24124 5.43267 5.79258 5.98533 5.79258 6.66667Z" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M5.79462 6.66667H10.0066V7.90133" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M8.12142 7.90133V6.66667" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M0.5 6.66667C0.5 2.042 2.042 0.5 6.66667 0.5C11.2913 0.5 12.8333 2.042 12.8333 6.66667C12.8333 11.2913 11.2913 12.8333 6.66667 12.8333C2.042 12.8333 0.5 11.2913 0.5 6.66667Z" stroke="#4F5665" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <input type="password" id="confirm-password" placeholder="Re-Type Your New Password" class="form-control">
                                <button type="button" class="toggle-password" data-target="confirm-password" aria-label="Toggle password visibility">
                                    <svg class="eye-icon eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M1 1l22 22" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M10.73 10.73a3 3 0 0 0 4.54 4.54" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <svg class="eye-icon eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <circle cx="12" cy="12" r="3" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button class="submit-btn" type="submit" id="submit-change-password">Submit</button>

                    </form>

                </div>
            </div>

        </main>
    </div>

    <script>
        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var targetId = this.getAttribute('data-target');
                var input = document.getElementById(targetId);
                var eyeOff = this.querySelector('.eye-off');
                var eyeOn = this.querySelector('.eye-on');

                if (input.type === 'password') {
                    input.type = 'text';
                    eyeOff.style.display = 'none';
                    eyeOn.style.display = 'inline';
                } else {
                    input.type = 'password';
                    eyeOff.style.display = 'inline';
                    eyeOn.style.display = 'none';
                }
            });
        });
    </script>

</body>
</html>
